<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>声临其境 Demo1</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="project">声临其境 Demo1</p>
        <h1>Gold Teacher 方言语音工作台</h1>
      </div>
      <div class="status-pill" id="service-status">服务待检测</div>
    </header>

    <section class="workbench">
      <form class="input-panel" id="pipeline-form">
        <div class="section-head">
          <h2>输入</h2>
          <span>公网稳定版</span>
        </div>

        <label class="field file-field">
          <span>主音频</span>
          <input id="input-audio" type="file" accept="audio/*" capture>
        </label>

        <label class="field">
          <span>或直接输入文本</span>
          <textarea id="input-text" rows="4" placeholder="例如：欢迎大家来参加方言配音挑战。"></textarea>
        </label>

        <div class="control-grid">
          <label class="field">
            <span>目标方言</span>
            <select id="target-dialect">
              <option value="yue:guangdong_general">粤语</option>
              <option value="sichuan:sichuan_general">四川话</option>
              <option value="minnan:minnan_general">闽南语</option>
            </select>
          </label>

          <label class="field">
            <span>Gold Teacher 音色</span>
            <select id="voice">
              <option value="Kiki">Kiki</option>
              <option value="Rocky">Rocky</option>
            </select>
          </label>
        </div>

        <div class="stable-route">
          <div>
            <strong>Voice Matched</strong>
            <p>2C2G 公网首版默认回退 Gold Teacher，避免文本克隆冒充 teacher-first 音色迁移。</p>
          </div>
          <span>关闭</span>
        </div>

        <button id="submit-btn" type="submit">生成 Gold Teacher</button>
        <p id="status-text" class="status idle">等待输入</p>
      </form>

      <section class="output-panel">
        <div class="summary-strip">
          <div>
            <span>推荐主输出</span>
            <strong id="recommended-output">未生成</strong>
          </div>
          <div>
            <span>总耗时</span>
            <strong id="total-latency">-</strong>
          </div>
          <div>
            <span>Trace ID</span>
            <strong id="trace-id">-</strong>
          </div>
        </div>

        <div class="audio-row">
          <article class="audio-box primary">
            <div class="box-head">
              <h2>Gold Teacher</h2>
              <a id="gold-download" class="download-link hidden" href="#" download>下载</a>
            </div>
            <audio id="gold-audio" controls preload="none"></audio>
            <p id="gold-note">生成后显示系统方言发音参考。</p>
          </article>

          <article class="audio-box">
            <div class="box-head">
              <h2>Voice Matched</h2>
              <a id="matched-download" class="download-link hidden" href="#" download>下载</a>
            </div>
            <audio id="matched-audio" controls preload="none"></audio>
            <p id="matched-note">公网稳定版默认关闭。</p>
          </article>
        </div>

        <div class="error-line" id="error-text">无错误</div>
      </section>
    </section>

    <section class="details">
      <article>
        <h3>ASR 原始文本</h3>
        <p id="asr-text">-</p>
      </article>
      <article>
        <h3>审查后文本</h3>
        <p id="reviewed-text">-</p>
      </article>
      <article>
        <h3>语义/方言文本</h3>
        <p id="semantic-text">-</p>
      </article>
      <article>
        <h3>发音提示层</h3>
        <p id="pronunciation-text">-</p>
      </article>
      <article>
        <h3>韵律提示层</h3>
        <p id="prosody-text">-</p>
      </article>
      <article>
        <h3>文化百科卡片</h3>
        <p id="cultural-cards">-</p>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
